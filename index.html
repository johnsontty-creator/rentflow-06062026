<!doctype html>
<html lang="zh-Hans">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>RentFlow</title>
  <style>
    :root{--bg:#f5f3ee;--ink:#202124;--muted:#6b7280;--line:#d8ddd9;--panel:#fff;--soft:#f8faf9;--brand:#176b5b;--brand2:#0f766e;--bad:#b42318;--ok:#15803d;--warn:#b45309;--shadow:0 10px 28px rgba(32,33,36,.08)}
    *{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink);font-family:Inter,Segoe UI,Arial,sans-serif}button,input,select,textarea{font:inherit}button{border:0;border-radius:6px;background:var(--brand);color:#fff;padding:9px 12px;min-height:38px;cursor:pointer}button:hover{background:var(--brand2)}button.secondary{background:#eef2f0;color:var(--ink);border:1px solid var(--line)}button.danger{background:var(--bad)}.app{display:grid;grid-template-columns:245px 1fr;min-height:100vh}aside{background:#123c34;color:#fff;padding:18px 12px;position:sticky;top:0;height:100vh;overflow:auto}.brand{padding:8px 10px 18px;border-bottom:1px solid rgba(255,255,255,.16);margin-bottom:12px}.brand-logo{display:block;width:100%;max-width:210px;height:auto;margin-bottom:8px}.brand p{margin:0;color:rgba(255,255,255,.72);font-size:13px;line-height:1.4}.nav{display:grid;gap:6px}.nav button{background:transparent;color:rgba(255,255,255,.82);text-align:left}.nav button.active,.nav button:hover{background:rgba(255,255,255,.13);color:#fff}main{padding:24px;min-width:0}.top{display:flex;justify-content:space-between;gap:16px;margin-bottom:18px}.top h2{margin:0 0 4px;font-size:25px}.top p{margin:0;color:var(--muted)}.actions{display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end}.stats{display:grid;grid-template-columns:repeat(4,minmax(150px,1fr));gap:12px;margin-bottom:16px}.stat,.panel{background:var(--panel);border:1px solid var(--line);border-radius:8px;box-shadow:var(--shadow)}.stat{padding:14px}.stat span{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.04em}.stat strong{display:block;margin-top:8px;font-size:23px;overflow-wrap:anywhere}.good{color:var(--ok)}.bad{color:var(--bad)}.grid{display:grid;grid-template-columns:360px minmax(0,1fr);gap:16px;align-items:start}.head{padding:14px 16px;background:var(--soft);border-bottom:1px solid var(--line);display:flex;justify-content:space-between;gap:12px;align-items:center}.head h3{margin:0;font-size:16px}.body{padding:16px}.section{display:none}.section.active{display:block}form{display:grid;gap:11px}.row{display:grid;grid-template-columns:1fr 1fr;gap:10px}.field{display:grid;gap:6px}.field label{font-weight:650;font-size:13px}.field input,.field select,.field textarea{border:1px solid var(--line);border-radius:6px;padding:9px 10px;background:#fff;min-height:38px;width:100%}.field textarea{min-height:72px;resize:vertical}.form-actions{display:flex;gap:8px;flex-wrap:wrap}.table-wrap{overflow-x:auto}table{width:100%;border-collapse:collapse;min-width:760px}th,td{border-bottom:1px solid var(--line);padding:10px 12px;text-align:left;vertical-align:top;font-size:14px}th{background:#f3f5f3;color:#374151;font-size:12px;text-transform:uppercase;letter-spacing:.04em}.pill{display:inline-flex;border-radius:999px;padding:3px 8px;font-size:12px;background:#eef2f0;color:#25443d;white-space:nowrap}.pill.ok{background:#dcfce7;color:#166534}.pill.bad{background:#fee2e2;color:#991b1b}.pill.warn{background:#ffedd5;color:#9a3412}.muted{color:var(--muted)}.mini{display:flex;gap:6px}.mini button{width:36px;padding:0}.empty{padding:24px;text-align:center;color:var(--muted);border:1px dashed var(--line);border-radius:8px;background:#fff}.cash{display:grid;gap:10px}.cash-row{display:grid;grid-template-columns:minmax(130px,1fr) repeat(5,minmax(70px,auto));gap:10px;align-items:center;padding:10px 12px;border:1px solid var(--line);border-radius:8px;background:#fff}.cash-row span{color:var(--muted);font-size:12px}.amt{text-align:right;font-weight:750}.bill-preview{max-width:100%;max-height:150px;border:1px solid var(--line);border-radius:6px;object-fit:contain;background:#fff}.bill-link{color:var(--brand);font-weight:700;text-decoration:none}.ocr-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}.ocr-status{font-size:12px;color:var(--muted);line-height:1.35}.toast{position:fixed;right:18px;bottom:18px;background:#111827;color:#fff;padding:10px 12px;border-radius:6px;opacity:0;transform:translateY(8px);transition:.2s}.toast.show{opacity:1;transform:none}#file{display:none}
    @media(max-width:940px){.app{grid-template-columns:1fr}aside{position:static;height:auto}.nav{grid-template-columns:repeat(2,1fr)}main{padding:16px}.top{flex-direction:column}.actions{justify-content:flex-start}.grid{grid-template-columns:1fr}.stats{grid-template-columns:repeat(2,1fr)}}@media(max-width:560px){.nav,.stats,.row{grid-template-columns:1fr}.cash-row{grid-template-columns:1fr 1fr}.amt{text-align:left}}
  </style>
</head>
<body>
<div class="app">
  <aside>
    <div class="brand"><img class="brand-logo" src="rentflow-logo-1.svg" alt="RentFlow"><p>公寓、店铺、租金、贷款、维修、税务和提醒。</p></div>
    <div class="nav" id="nav"></div>
  </aside>
  <main>
    <div class="top">
      <div><h2 id="title">Dashboard</h2><p id="sub">本月现金流和到期事项。</p></div>
      <div class="actions">
        <button class="secondary" id="backup">备份 JSON</button>
        <button class="secondary" id="restore">导入 JSON</button>
        <button id="csv">导出 CSV</button>
        <input id="file" type="file" accept="application/json">
      </div>
    </div>
    <section id="dashboard" class="section active"><div id="stats" class="stats"></div><div class="grid"><div class="panel"><div class="head"><h3>到期提醒</h3></div><div class="body" id="soon"></div></div><div class="panel"><div class="head"><h3>本月每间产业现金流</h3></div><div class="body"><div id="cash" class="cash"></div></div></div></div><div class="panel" style="margin-top:16px"><div class="head"><h3>本月租金状态</h3></div><div class="table-wrap" id="rentStatus"></div></div></section>
    <section id="properties" class="section"></section>
    <section id="tenants" class="section"></section>
    <section id="transactions" class="section"></section>
    <section id="loans" class="section"></section>
    <section id="maintenance" class="section"></section>
    <section id="reminders" class="section"></section>
    <section id="reports" class="section"></section>
  </main>
</div>
<div id="toast" class="toast"></div>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
<script>
const key="property-manager-v1",today=new Date(),ym=today.toISOString().slice(0,7),fmt=new Intl.NumberFormat("en-MY",{style:"currency",currency:"MYR"});
const tabs=[["dashboard","Dashboard","本月现金流和到期事项。"],["properties","产业资料","管理公寓、店铺、购买资料和账号。"],["tenants","租客管理","租客、押金、月租和合约日期。"],["transactions","收入支出","租金、水电、税务、管理费和杂费。"],["loans","贷款 Installment","每间产业的银行贷款与月供。"],["maintenance","维修装修","维修、装修、承包商和费用。"],["reminders","提醒事项","租约、税务、保险、管理费和其他提醒。"],["reports","报表","按月份和产业查看盈亏。"]];
const blank={properties:[],tenants:[],transactions:[],loans:[],maintenance:[],reminders:[]};
const banks=["Affin Bank","Alliance Bank","Ambank","Bank of China","CIMB Bank","Citibank","Hong Leong Bank","HSBC Bank","OCBC Bank","Public Bank","RHB Bank","UOB Bank"];
function yearMonths(y=today.getFullYear()){return Array.from({length:12},(_,i)=>`${y}-${String(i+1).padStart(2,"0")}`)}
let db=load(),tab="dashboard",edit={};
function load(){try{return {...structuredClone(blank),...JSON.parse(localStorage.getItem(key)||"{}")}}catch{return structuredClone(blank)}}function save(){localStorage.setItem(key,JSON.stringify(db))}function id(){return crypto.randomUUID?crypto.randomUUID():String(Date.now()+Math.random())}function money(v){return fmt.format(Number(v||0))}function esc(v=""){return String(v).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"}[c]))}function prop(id){return db.properties.find(p=>p.id===id)?.name||"未选择产业"}function toast(t){let e=document.getElementById("toast");e.textContent=t;e.classList.add("show");setTimeout(()=>e.classList.remove("show"),1600)}
function opts(arr,sel){return arr.map(v=>`<option ${v===sel?"selected":""}>${v}</option>`).join("")}function propOpts(sel=""){return `<option value="">选择产业</option>`+db.properties.map(p=>`<option value="${p.id}" ${p.id===sel?"selected":""}>${esc(p.name)}</option>`).join("")}
function nav(){document.getElementById("nav").innerHTML=tabs.map(x=>`<button class="${tab===x[0]?"active":""}" data-tab="${x[0]}">${x[1]}</button>`).join("");document.querySelectorAll("[data-tab]").forEach(b=>b.onclick=()=>show(b.dataset.tab))}
function show(x){tab=x;document.querySelectorAll(".section").forEach(s=>s.classList.toggle("active",s.id===x));let t=tabs.find(a=>a[0]===x);title.textContent=t[1];sub.textContent=t[2];nav();render()}
function txMonth(m=ym){return db.transactions.filter(t=>(t.date||"").slice(0,7)===m&&t.status!=="未付")}
function render(){dashboard();properties();tenants();transactions();loans();maintenance();reminders();reports()}
function dashboard(){let tx=txMonth(),inc=sum(tx.filter(t=>t.type==="收入"),"amount"),exp=sum(tx.filter(t=>t.type==="支出"),"amount"),loan=sum(db.loans,"monthlyPayment"),net=inc-exp-loan;stats.innerHTML=[["本月收入",inc,"good"],["本月支出",exp,"bad"],["每月 Installment",loan,"bad"],["净现金流",net,net>=0?"good":"bad"]].map(a=>`<div class="stat"><span>${a[0]}</span><strong class="${a[2]}">${money(a[1])}</strong></div>`).join("");let list=upcoming().slice(0,6);soon.innerHTML=list.length?list.map(reminderRow).join(""):`<div class="empty">未来 30 天暂无提醒。</div>`;cash.innerHTML=db.properties.length?db.properties.map(p=>{let ptx=tx.filter(t=>t.propertyId===p.id),i=sum(ptx.filter(t=>t.type==="收入"),"amount"),e=sum(ptx.filter(t=>t.type==="支出"),"amount"),l=sum(db.loans.filter(x=>x.propertyId===p.id),"monthlyPayment"),n=i-e-l;return `<div class="cash-row"><strong>${esc(p.name)}<br><span>${esc(p.type||"")} · ${esc(p.status||"")}</span></strong><div><span>收入</span><div class="amt good">${money(i)}</div></div><div><span>支出</span><div class="amt bad">${money(e)}</div></div><div><span>贷款</span><div class="amt bad">${money(l)}</div></div><div><span>净额</span><div class="amt ${n>=0?"good":"bad"}">${money(n)}</div></div><div><span>操作</span><div class="mini"><button class="danger" title="删除产业" data-del="properties:${p.id}">×</button></div></div></div>`}).join(""):`<div class="empty">先新增一间产业。</div>`;rentStatus.innerHTML=rentRows()}
function shell(sec,form,table){document.getElementById(sec).innerHTML=`<div class="grid"><div class="panel"><div class="head"><h3>${edit[sec]?"编辑":"新增"}</h3></div><div class="body">${form}</div></div><div class="panel"><div class="head"><h3>记录</h3></div><div class="table-wrap">${table}</div></div></div>`}
function buttons(sec){return `<div class="form-actions"><button>保存</button>${edit[sec]?`<button type="button" class="secondary" data-cancel="${sec}">取消</button>`:""}</div>`}
function act(sec,i){return `<div class="mini"><button class="secondary" title="编辑" data-edit="${sec}:${i}">✎</button><button class="danger" title="删除" data-del="${sec}:${i}">×</button></div>`}
function tbl(h,rows){return rows.length?`<table><thead><tr>${h.map(x=>`<th>${x}</th>`).join("")}</tr></thead><tbody>${rows.map(r=>`<tr>${r.map(c=>`<td>${c}</td>`).join("")}</tr>`).join("")}</tbody></table>`:`<div class="empty">还没有记录。</div>`}
function readImg(file){return new Promise((res,rej)=>{let r=new FileReader();r.onload=()=>res(r.result);r.onerror=rej;r.readAsDataURL(file)})}
async function bind(form,sec){let f=document.getElementById(form);if(!f)return;f.onsubmit=async e=>{e.preventDefault();let fd=new FormData(f),v=Object.fromEntries(fd.entries()),file=fd.get("billImageFile");delete v.billImageFile;if(sec==="maintenance"&&file&&file.size){v.billImage=await readImg(file);v.billName=file.name}if(edit[sec]){db[sec]=db[sec].map(x=>x.id===edit[sec]?{...x,...v}:x);edit[sec]=null;toast("已更新")}else{db[sec].push({id:id(),...v});toast("已保存")}save();render()}}
function properties(){let x=db.properties.find(a=>a.id===edit.properties)||{};shell("properties",`<form id="fProp"><div class="field"><label>产业名称</label><input name="name" required value="${esc(x.name)}"></div><div class="row"><div class="field"><label>类型</label><select name="type">${opts(["公寓","店铺","办公室","土地","别墅"],x.type)}</select></div><div class="field"><label>状态</label><select name="status">${opts(["出租中","空置","装修中","自住","待售"],x.status)}</select></div></div><div class="field"><label>地址</label><textarea name="address">${esc(x.address)}</textarea></div><div class="row"><div class="field"><label>购买价格</label><input name="purchasePrice" type="number" step="0.01" value="${x.purchasePrice||""}"></div><div class="field"><label>购买日期</label><input name="purchaseDate" type="date" value="${x.purchaseDate||""}"></div></div><div class="row"><div class="field"><label>门牌税账号</label><input name="assessmentAccount" value="${esc(x.assessmentAccount)}"></div><div class="field"><label>管理费账号</label><input name="maintenanceAccount" value="${esc(x.maintenanceAccount)}"></div></div><div class="row"><div class="field"><label>水费账号</label><input name="waterAccount" value="${esc(x.waterAccount)}"></div><div class="field"><label>电费账号</label><input name="electricAccount" value="${esc(x.electricAccount)}"></div></div><div class="field"><label>备注</label><textarea name="notes">${esc(x.notes)}</textarea></div>${buttons("properties")}</form>`,tbl(["名称","类型","状态","购买价","账号",""],db.properties.map(p=>[`<strong>${esc(p.name)}</strong><br><span class="muted">${esc(p.address||"")}</span>`,esc(p.type),`<span class="pill">${esc(p.status)}</span>`,money(p.purchasePrice),`<span class="muted">门牌税: ${esc(p.assessmentAccount||"-")}<br>水: ${esc(p.waterAccount||"-")} · 电: ${esc(p.electricAccount||"-")}</span>`,act("properties",p.id)])));bind("fProp","properties")}
function tenants(){let x=db.tenants.find(a=>a.id===edit.tenants)||{};shell("tenants",`<form id="fTenant"><div class="field"><label>产业</label><select name="propertyId" required>${propOpts(x.propertyId)}</select></div><div class="row"><div class="field"><label>租客姓名</label><input name="name" required value="${esc(x.name)}"></div><div class="field"><label>电话</label><input name="phone" value="${esc(x.phone)}"></div></div><div class="row"><div class="field"><label>合约开始</label><input name="startDate" type="date" value="${x.startDate||""}"></div><div class="field"><label>合约结束</label><input name="endDate" type="date" value="${x.endDate||""}"></div></div><div class="row"><div class="field"><label>月租</label><input name="monthlyRent" type="number" step="0.01" value="${x.monthlyRent||""}"></div><div class="field"><label>押金</label><input name="deposit" type="number" step="0.01" value="${x.deposit||""}"></div></div><div class="row"><div class="field"><label>水电押金</label><input name="utilityDeposit" type="number" step="0.01" value="${x.utilityDeposit||""}"></div><div class="field"><label>状态</label><select name="status">${opts(["有效","即将到期","已搬走"],x.status)}</select></div></div><div class="field"><label>备注</label><textarea name="notes">${esc(x.notes)}</textarea></div>${buttons("tenants")}</form>`,tbl(["租客","产业","合约","月租","押金",""],db.tenants.map(t=>[`<strong>${esc(t.name)}</strong><br><span class="muted">${esc(t.phone||"")}</span>`,esc(prop(t.propertyId)),`${t.startDate||"-"} 至 ${t.endDate||"-"}<br><span class="pill ${soonDate(t.endDate)?"warn":""}">${esc(t.status||"")}</span>`,money(t.monthlyRent),money(Number(t.deposit||0)+Number(t.utilityDeposit||0)),act("tenants",t.id)])));bind("fTenant","tenants")}
function transactions(){let x=db.transactions.find(a=>a.id===edit.transactions)||{},selected=document.getElementById("txMonth")?.value||ym,rows=db.transactions.filter(t=>(t.date||"").slice(0,7)===selected);shell("transactions",`<form id="fTx"><div class="row"><div class="field"><label>日期</label><input name="date" type="date" required value="${x.date||today.toISOString().slice(0,10)}"></div><div class="field"><label>产业</label><select name="propertyId" required>${propOpts(x.propertyId)}</select></div></div><div class="row"><div class="field"><label>类型</label><select name="type">${opts(["收入","支出"],x.type)}</select></div><div class="field"><label>分类</label><select name="category">${opts(["租金","停车位","Installment","管理费","水费","电费","Indah Water","门牌税","地税","维修费","装修费","中介费","保险","杂费","其他"],x.category)}</select></div></div><div class="row"><div class="field"><label>金额</label><input name="amount" type="number" step="0.01" required value="${x.amount||""}"></div><div class="field"><label>付款状态</label><select name="status">${opts(["已付","未付","部分付款"],x.status)}</select></div></div><div class="row"><div class="field"><label>付款方式</label><select name="method">${opts(["银行转账","现金","Cheque","E-wallet","自动扣账","其他"],x.method)}</select></div><div class="field"><label>Reference</label><input name="reference" value="${esc(x.reference)}"></div></div><div class="field"><label>备注</label><textarea name="notes">${esc(x.notes)}</textarea></div>${buttons("transactions")}</form>`,`<div class="body"><div class="filters"><label class="muted">显示月份</label><select id="txMonth">${yearMonths().map(m=>`<option ${m===selected?"selected":""}>${m}</option>`).join("")}</select></div></div>`+tbl(["日期","产业","类型","分类","金额","状态",""],rows.slice().sort(dateDesc).map(t=>[t.date||"-",esc(prop(t.propertyId)),`<span class="pill ${t.type==="收入"?"ok":"bad"}">${esc(t.type)}</span>`,esc(t.category),money(t.amount),`<span class="pill ${t.status==="已付"?"ok":t.status==="未付"?"bad":"warn"}">${esc(t.status)}</span>`,act("transactions",t.id)])));bind("fTx","transactions");rentBind();let monthEl=document.getElementById("txMonth");if(monthEl)monthEl.onchange=transactions}function loans(){let x=db.loans.find(a=>a.id===edit.loans)||{};shell("loans",`<form id="fLoan"><div class="field"><label>产业</label><select name="propertyId" required>${propOpts(x.propertyId)}</select></div><div class="row"><div class="field"><label>银行</label><select name="bank" required><option value="">选择银行</option>${banks.map(b=>`<option ${b===x.bank?"selected":""}>${b}</option>`).join("")}</select></div><div class="field"><label>每月 Installment</label><input name="monthlyPayment" type="number" step="0.01" required value="${x.monthlyPayment||""}"></div></div><div class="row"><div class="field"><label>贷款金额</label><input name="principal" type="number" step="0.01" value="${x.principal||""}"></div><div class="field"><label>剩余贷款</label><input name="balance" type="number" step="0.01" value="${x.balance||""}"></div></div><div class="row"><div class="field"><label>利率 %</label><input name="interestRate" type="number" step="0.01" value="${x.interestRate||""}"></div><div class="field"><label>付款日</label><input name="paymentDay" type="number" min="1" max="31" value="${x.paymentDay||""}"></div></div>${buttons("loans")}</form>`,tbl(["产业","银行","月供","剩余贷款","利率","付款日",""],db.loans.map(l=>[esc(prop(l.propertyId)),esc(l.bank),money(l.monthlyPayment),money(l.balance),`${esc(l.interestRate||"-")}%`,l.paymentDay?`每月 ${l.paymentDay} 号`:"-",act("loans",l.id)])));bind("fLoan","loans")}
function maintenance(){let x=db.maintenance.find(a=>a.id===edit.maintenance)||{};shell("maintenance",`<form id="fMaint"><div class="row"><div class="field"><label>日期</label><input name="date" type="date" required value="${x.date||today.toISOString().slice(0,10)}"></div><div class="field"><label>产业</label><select name="propertyId" required>${propOpts(x.propertyId)}</select></div></div><div class="row"><div class="field"><label>项目</label><input name="title" required value="${esc(x.title)}"></div><div class="field"><label>类型</label><select name="type">${opts(["维修","装修","检查","更换","其他"],x.type)}</select></div></div><div class="row"><div class="field"><label>承包商 / 师傅</label><input name="vendor" value="${esc(x.vendor)}"></div><div class="field"><label>金额</label><input name="amount" type="number" step="0.01" value="${x.amount||""}"></div></div><div class="field"><label>账单扫描 / 图片</label><input name="billImageFile" type="file" accept="image/*"><div class="ocr-row"><button type="button" class="secondary" id="ocrBill">读取账单资料</button><span class="ocr-status" id="ocrStatus">先选择账单图片，再读取日期、金额和师傅资料。</span></div>${x.billImage?`<img class="bill-preview" src="${x.billImage}" alt="账单预览"><span class="muted">${esc(x.billName||"已保存账单图片")}</span>`:`<span class="muted">选择电脑里的账单照片或扫描图，保存后会自动放入这条记录。</span>`}</div><div class="field"><label>状态</label><select name="status">${opts(["计划中","进行中","已完成","保留"],x.status)}</select></div><div class="field"><label>备注</label><textarea name="notes">${esc(x.notes)}</textarea></div>${buttons("maintenance")}</form>`,tbl(["日期","产业","项目","类型","金额","状态","账单",""],db.maintenance.slice().sort(dateDesc).map(m=>[m.date||"-",esc(prop(m.propertyId)),`<strong>${esc(m.title)}</strong><br><span class="muted">${esc(m.vendor||"")}</span>`,esc(m.type),money(m.amount),`<span class="pill ${m.status==="已完成"?"ok":"warn"}">${esc(m.status)}</span>`,m.billImage?`<a class="bill-link" href="${m.billImage}" target="_blank" download="${esc(m.billName||"bill-image")}">查看账单</a>`:`<span cla function reminders(){let x=db.reminders.find(a=>a.id===edit.reminders)||{};shell("reminders",`<form id="fRem"><div class="field"><label>产业</label><select name="propertyId">${propOpts(x.propertyId)}</select></div><div class="row"><div class="field"><label>标题</label><input name="title" required value="${esc(x.title)}"></div><div class="field"><label>分类</label><select name="category">${opts(["租约","门牌税","地税","保险","管理费","贷款","维修","其他"],x.category)}</select></div></div><div class="row"><div class="field"><label>到期日</label><input name="dueDate" type="date" required value="${x.dueDate||""}"></div><div class="field"><label>状态</label><select name="status">${opts(["待处理","完成","延期"],x.status)}</select></div></div><div class="field"><label>备注</label><textarea name="notes">${esc(x.notes)}</textarea></div>${buttons("reminders")}</form>`,tbl(["到期日","标题","产业","分类","状态",""],db.reminders.slice().sort((a,b)=>String(a.dueDate).localeCompare(String(b.dueDate))).map(r=>[r.dueDate||"-",`<strong>${esc(r.title)}</strong><br><span class="muted">${esc(r.notes||"")}</span>`,esc(prop(r.propertyId)),esc(r.category),`<span class="pill ${r.status==="完成"?"ok":soonDate(r.dueDate)?"warn":""}">${esc(r.status)}</span>`,act("reminders",r.id)])));bind("fRem","reminders")}
function reports(){let months=yearMonths(),sel=document.getElementById("month")?.value||ym,tx=txMonth(sel),host=document.getElementById("reports"),items=db.properties.map(p=>{let ptx=tx.filter(t=>t.propertyId===p.id),income=sum(ptx.filter(t=>t.type==="收入"),"amount"),expense=sum(ptx.filter(t=>t.type==="支出"),"amount"),loan=sum(db.loans.filter(x=>x.propertyId===p.id),"monthlyPayment"),net=income-expense-loan;return{name:p.name,income,expense,loan,net}}).filter(x=>x.net!==0),rows=items.map(x=>[esc(x.name),money(x.income),money(x.expense),money(x.loan),`<strong class="${x.net>=0?"good":"bad"}">${money(x.net)}</strong>`]),totalIncome=sum(items,"income"),totalExpense=sum(items,"expense"),totalLoan=sum(items,"loan"),totalNet=sum(items,"net");host.innerHTML=`<div class="panel"><div class="head"><h3>月度盈亏</h3><select id="month">${months.map(m=>`<option ${m===sel?"selected":""}>${m}</option>`).join("")}</select></div><div class="table-wrap">${tbl(["产业","收入","支出","贷款","净现金流"],rows)}</div><div class="body"><div class="stats"><div class="stat"><span>总收入</span><strong class="good">${money(totalIncome)}</strong></div><div class="stat"><span>总支出</span><strong class="bad">${money(totalExpense)}</strong></div><div class="stat"><span>总贷款</span><strong class="bad">${money(totalLoan)}</strong></div><div class="stat"><span>总净现金流</span><strong class="${totalNet>=0?"good":"bad"}">${money(totalNet)}</strong></div></div></div></div>`;let monthEl=document.getElementById("month");if(monthEl)monthEl.onchange=reports}
function sum(a,k){return a.reduce((s,x)=>s+Number(x[k]||0),0)}function dateDesc(a,b){return String(b.date||"").localeCompare(String(a.date||""))}function soonDate(d){if(!d)return false;let diff=(new Date(d)-new Date(today.toISOString().slice(0,10)))/86400000;return diff>=0&&diff<=30}
function upcoming(){let manual=db.reminders.filter(r=>r.status!=="完成"),contracts=db.tenants.filter(t=>t.endDate).map(t=>({title:`租约到期：${t.name}`,propertyId:t.propertyId,category:"租约",dueDate:t.endDate,status:"待处理"}));return [...manual,...contracts].filter(r=>soonDate(r.dueDate)).sort((a,b)=>String(a.dueDate).localeCompare(String(b.dueDate)))}
function reminderRow(r){return `<div class="cash-row"><strong>${esc(r.title)}<br><span>${esc(prop(r.propertyId))}</span></strong><div><span>分类</span><div>${esc(r.category||"-")}</div></div><div><span>到期</span><div>${r.dueDate||"-"}</div></div><div><span>状态</span><div><span class="pill warn">${esc(r.status||"待处理")}</span></div></div></div>`}
function rentRows(){let tx=txMonth(),active=db.tenants.filter(t=>t.status!=="已搬走"&&Number(t.monthlyRent||0)>0);return tbl(["产业","租客","月租","本月状态","收款日期"],active.map(t=>{let paid=tx.find(x=>x.propertyId===t.propertyId&&x.category==="租金"&&x.status==="已付");return [esc(prop(t.propertyId)),`<strong>${esc(t.name)}</strong><br><span class="muted">${esc(t.phone||"")}</span>`,money(t.monthlyRent),paid?`<span class="pill ok">已收</span>`:`<span class="pill bad">未收</span>`,paid?.date||"-"]}))}
function rentBind(){let f=document.getElementById("fTx");if(!f)return;let property=f.propertyId,category=f.category,amount=f.amount,type=f.type;let fill=()=>{if(category.value!=="租金"||!property.value)return;let tenant=db.tenants.find(t=>t.propertyId===property.value&&t.status!=="已搬走"&&Number(t.monthlyRent||0)>0);if(tenant){amount.value=Number(tenant.monthlyRent).toFixed(2);type.value="收入"}};property.onchange=fill;category.onchange=fill;fill()}
function parseBill(text){let t=text.replace(/\s+/g," "),date=(t.match(/(\d{1,2}[\/.-]\d{1,2}[\/.-]\d{2,4})/)||[])[1]||"",amounts=[...t.matchAll(/(?:RM|MYR)?\s*([0-9]{1,3}(?:,[0-9]{3})*(?:\.\d{2})|[0-9]+\.\d{2})/gi)].map(m=>Number(m[1].replace(/,/g,""))).filter(n=>n>0),amount=amounts.length?Math.max(...amounts):"",vendor=(text.split(/\n/).map(x=>x.trim()).find(x=>x.length>3&&!/\d{3,}/.test(x))||"").slice(0,80);if(date){let p=date.split(/[\/.-]/);if(p[2]?.length===2)p[2]="20"+p[2];date=`${p[2]}-${p[1].padStart(2,"0")}-${p[0].padStart(2,"0")}`}return{date,amount,vendor}}
function ocrBind(){let b=document.getElementById("ocrBill"),f=document.querySelector('#fMaint input[name="billImageFile"]'),s=document.getElementById("ocrStatus"),form=document.getElementById("fMaint");if(!b||!f||!s||!form)return;b.onclick=async()=>{let file=f.files[0];if(!file){s.textContent="请先选择账单图片。";return}if(!window.Tesseract){s.textContent="OCR 引擎还没加载好。请确认电脑有联网，然后刷新再试。";return}b.disabled=true;s.textContent="正在读取账单，请等一下...";try{let r=await Tesseract.recognize(file,"eng+chi_sim",{logger:m=>{if(m.status)s.textContent=`读取中：${m.status} ${m.progress?Math.round(m.progress*100)+"%":""}`}}),p=parseBill(r.data.text);if(p.date)form.date.value=p.date;if(p.amount)form.amount.value=p.amount.toFixed(2);if(p.vendor&&!form.vendor.value)form.vendor.value=p.vendor;form.notes.value=(form.notes.value?form.notes.value+"\n\n":"")+"OCR 读取内容：\n"+r.data.text.trim();s.textContent="已读取并填入资料，请检查金额和日期是否正确。"}catch(e){s.textContent="读取失败。请换一张更清楚的图片，或手动填写。"}finally{b.disabled=false}}}
document.onclick=e=>{let ed=e.target.closest("[data-edit]")?.dataset.edit,del=e.target.closest("[data-del]")?.dataset.del,can=e.target.closest("[data-cancel]")?.dataset.cancel;if(ed){let[s,i]=ed.split(":");edit[s]=i;render();scrollTo({top:0,behavior:"smooth"})}if(del){let[s,i]=del.split(":");if(confirm("确定要删除这条记录吗？")){db[s]=db[s].filter(x=>x.id!==i);save();toast("已删除");render()}}if(can){edit[can]=null;render()}};
backup.onclick=()=>download(`property-backup-${today.toISOString().slice(0,10)}.json`,JSON.stringify(db,null,2),"application/json");restore.onclick=()=>file.click();file.onchange=e=>{let f=e.target.files[0];if(!f)return;let r=new FileReader();r.onload=()=>{try{db={...structuredClone(blank),...JSON.parse(r.result)};save();toast("已导入");render()}catch{alert("JSON 文件格式不正确")}};r.readAsText(f)};csv.onclick=()=>{let selectedMonth=document.getElementById("month")?.value||ym,rows=db.transactions.filter(t=>(t.date||"").slice(0,7)===selectedMonth);download(`transactions-${selectedMonth}.csv`,[["Date","Property","Type","Category","Amount","Status","Method","Reference","Notes"],...rows.map(t=>[t.date,prop(t.propertyId),t.type,t.category,t.amount,t.status,t.method,t.reference,t.notes])].map(r=>r.map(v=>`"${String(v||"").replace(/"/g,'""')}"`).join(",")).join("\n"),"text/csv")};
function download(name,content,type){let b=new Blob([content],{type}),u=URL.createObjectURL(b),a=document.createElement("a");a.href=u;a.download=name;a.click();URL.revokeObjectURL(u)}
